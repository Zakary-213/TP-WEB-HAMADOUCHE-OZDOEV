<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Zip - Puzzle Mode</title>
    <meta name="description" content="Jeu ZIP en mode gaming. Reliez les chiffres en traçant un chemin qui remplit toute la grille.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">

        <!-- Header LinkedIn style -->
        <header class="app-header">
            <div class="brand">
                <svg class="brand-logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="40" height="40" rx="8" fill="#0d2038"/>
                    <path d="M23 6L12 22h8l-3 12 11-16h-8l3-12z" fill="#14d4ff"/>
                </svg>
                <div class="brand-text">
                    <span class="brand-name">NEON ZIP</span>
                    <span class="brand-sub">Puzzle Arena</span>
                </div>
            </div>

            <div class="header-controls">
                <div class="difficulty-selector">
                    <label for="difficulty">Difficulté</label>
                    <select id="difficulty">
                        <option value="easy">Facile</option>
                        <option value="medium" selected>Moyen</option>
                        <option value="hard">Difficile</option>
                    </select>
                </div>
                <div id="timer" class="timer-display">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                    </svg>
                    <span id="timer-text">00:00</span>
                </div>
            </div>
        </header>

        <!-- Instructions -->
        <div class="instructions">
            Tracez un chemin de <strong>1</strong> à <strong id="max-num">?</strong> qui passe par <strong>toutes</strong> les cases.
        </div>

        <!-- Grille -->
        <main class="game-area">
            <div id="grid-container">
                <div id="grid"></div>
            </div>
        </main>

        <!-- Actions -->
        <div class="action-bar">
            <button id="reset" class="btn btn-secondary">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
                </svg>
                Recommencer
            </button>
            <button id="new-puzzle" class="btn btn-primary">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                </svg>
                Nouveau Puzzle
            </button>
            <button id="hint-btn" class="btn btn-accent">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                    <path d="M9 18h6"/>
                    <path d="M10 22h4"/>
                    <path d="M8 14c-1.2-1-2-2.7-2-4.5A6 6 0 0 1 18 9.5c0 1.8-.8 3.5-2 4.5-.7.6-1 1.2-1 2H9c0-.8-.3-1.4-1-2z"/>
                </svg>
                Indice
            </button>
        </div>

        <p id="hint-text" class="hint-text">Indice: clique pour voir le premier déplacement conseillé.</p>

    </div>

    <!-- Loading overlay -->
    <div id="loading" class="loading-overlay hidden">
        <div class="loading-spinner"></div>
        <span>Génération du puzzle…</span>
    </div>

    <!-- Win overlay -->
    <div id="win-overlay" class="win-overlay hidden">
        <div class="win-card">
            <div class="win-icon">🎉</div>
            <h2>Bravo !</h2>
            <p class="win-subtitle">Vous avez complété le puzzle</p>
            <div class="win-stats">
                <div class="win-stat">
                    <span class="win-stat-label">Temps</span>
                    <span class="win-stat-value" id="win-time">--:--</span>
                </div>
                <div class="win-stat">
                    <span class="win-stat-label">Difficulté</span>
                    <span class="win-stat-value" id="win-difficulty">--</span>
                </div>
            </div>
            <div class="win-buttons">
                <button id="overlay-new-puzzle" class="btn btn-primary">Nouveau Puzzle</button>
                <button id="overlay-reset" class="btn btn-secondary">Rejouer</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
