<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Babylon.js Football Pitch</title>
    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://code.jquery.com/pep/0.4.3/pep.js"></script>
</head>

<body>

    <!-- HUD Global (Tableau des scores + Chrono) -->
    <div id="match-hud">
        <!-- Tableau des scores façon FIFA -->
        <div id="scoreboard-container">
            <div class="team team-left">
                <span class="team-name">YOU</span>
                <span class="team-color" style="background-color: #ff3333;"></span>
            </div>
            <div class="score-display">
                <span id="score-player">0</span>
                <span class="score-separator">-</span>
                <span id="score-ai">0</span>
            </div>
            <div class="team team-right">
                <span class="team-color" style="background-color: #3333ff;"></span>
                <span class="team-name">IA</span>
            </div>
        </div>
        
        <!-- Chronomètre -->
        <div id="match-timer">00:00</div>
    </div>

    <!-- Mi-temps (affiché uniquement pendant la pause) -->
    <div id="halftime-overlay">
        <div id="halftime-title">MI-TEMPS</div>
        <div id="halftime-reprise">Reprise dans <span id="halftime-countdown">10</span></div>
    </div>

    <!-- Fin du match (affiché uniquement à la fin) -->
    <div id="match-end-overlay">
        <div id="match-end-title">FIN DU MATCH</div>
        <div id="match-end-result">Match terminé</div>
        <div id="match-end-score">YOU 0 - 0 IA</div>
    </div>

    <!-- Intro d'avant-match (apparition style broadcast) -->
    <div id="pre-match-tournament-overlay">
        <div id="pre-match-tournament-line" class="pre-match-tournament-line">
            <div id="pre-match-tournament-head" class="pre-match-tournament-head">HUITIEME</div>
            <div id="pre-match-tournament-tail" class="pre-match-tournament-tail">
                <span id="pre-match-tournament-tail-text">DE FINALE</span>
            </div>
        </div>
    </div>

    <canvas id="renderCanvas" touch-action="none"></canvas>

    <!-- Utility functions -->
    <script src="js/utils/collisionUtils.js"></script>

    <!-- Project Structure Scripts -->
    <script src="js/structure/environnement.js"></script>
    <script src="js/structure/field.js"></script>
    <script src="js/structure/tribune.js"></script>
    <script src="js/structure/tribuneDemi.js"></script>
    <script src="js/structure/tribuneQuart.js"></script>
    <script src="js/structure/tribuneHuitieme.js"></script>
    <script src="js/structure/tribuneFinale.js"></script>
    <script src="js/objects/goal.js"></script>
    <script src="js/objects/ball.js"></script>
    <script src="js/objects/player.js"></script>
    <script src="js/objects/cameras.js"></script>
    <script src="js/objects/scoreboard3d.js"></script>

    <!-- Teams -->
    <script src="js/models/teams/Team.js"></script>
    <script src="js/models/teams/PlayerTeam.js"></script>
    <script src="js/models/teams/AITeam.js"></script>
    <script src="js/models/teams/AITeamHuitieme.js"></script>
    <script src="js/models/teams/AITeamQuart.js"></script>
    <script src="js/models/teams/AITeamDemi.js"></script>
    <script src="js/models/teams/AITeamFinale.js"></script>
    <!-- UI -->
    <script src="js/ui/scoreboard.js"></script>
    <script src="js/ui/matchFlow.js"></script>
    <script src="js/ui/preMatchIntro.js"></script>

    <!-- Main Script -->
    <script src="js/models/gameLogic.js"></script>
    <script src="js/models/restartLogic.js"></script>
    <script src="js/models/tackleLogic.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
